<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交貨便批次匯入工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap');
:root {
  --or:#f15a00;--ord:#c44a00;--orl:#fff3ec;--orm:#ffd4b8;
  --bg:#f7f5f2;--sf:#fff;--bd:#e8e2db;--bd2:#d5ccc2;
  --tx:#1a1208;--tx2:#6b5c4a;--tx3:#a8937c;
  --gn:#1a8a4a;--gnb:#edfaf3;
  --sh:0 2px 8px rgba(241,90,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shl:0 8px 32px rgba(241,90,0,.12),0 2px 8px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);font-size:13px;min-height:100vh}
.hdr{background:var(--or);padding:0 24px;height:54px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(241,90,0,.3);position:sticky;top:0;z-index:100}
.hdr-title{font-size:17px;font-weight:900;color:#fff;letter-spacing:-.5px}
.hdr-sub{color:rgba(255,255,255,.7);font-size:11px}
.pdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);transition:background .3s}
.pdot.ok{background:#7fff9a;box-shadow:0 0 6px #7fff9a}
.pdot.fail{background:#ffb347}
.plabel{color:rgba(255,255,255,.8);font-size:11px}
.pbanner{display:none;align-items:center;gap:10px;background:#fff8e1;border:1.5px solid #ffc107;border-radius:8px;padding:9px 14px;margin:12px 20px 0;font-size:12px;color:#7a5c00}
.pbanner code{background:#ffe082;padding:1px 6px;border-radius:4px;font-size:11px}
.main{display:grid;grid-template-columns:400px 1fr;gap:16px;padding:16px 20px 80px;max-width:1300px;margin:0 auto}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;box-shadow:var(--sh);overflow:hidden}
.ctitle{padding:10px 14px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;background:#faf8f6;display:flex;align-items:center;gap:6px}
.cbody{padding:14px}
label{font-size:11px;font-weight:600;color:var(--tx2);display:block;margin-bottom:3px}
input,select,textarea{width:100%;padding:7px 10px;border:1.5px solid var(--bd);border-radius:6px;font-family:inherit;font-size:13px;color:var(--tx);background:var(--sf);outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{border-color:var(--or);box-shadow:0 0 0 3px rgba(241,90,0,.1)}
textarea{resize:vertical;line-height:1.6;font-size:12px}
.fr{display:flex;gap:10px;margin-bottom:10px}
.fr .fg{flex:1}
.fg{margin-bottom:10px}
.fg:last-child{margin-bottom:0}
.ib{display:flex;gap:6px}
.ib input{flex:1}
.stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.stab{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--bd);background:var(--sf);color:var(--tx2);transition:all .15s}
.stab.active{background:var(--or);color:#fff;border-color:var(--or)}
.stab:hover:not(.active){border-color:var(--or);color:var(--or)}
.btn{padding:7px 14px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btp{background:var(--or);color:#fff}
.btp:hover:not(:disabled){background:var(--ord)}
.btg{background:transparent;color:var(--tx2);border:1.5px solid var(--bd)}
.btg:hover:not(:disabled){border-color:var(--or);color:var(--or);background:var(--orl)}
.btgn{background:var(--gn);color:#fff}
.btgn:hover:not(:disabled){background:#16763e}
.btsm{padding:5px 10px;font-size:11px}
.brow{display:flex;gap:8px;flex-wrap:wrap}
.twrap{overflow-x:auto;max-height:400px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:#faf8f6;position:sticky;top:0;z-index:1}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--bd);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rok td:first-child{border-left:3px solid var(--gn)}
tr.rwarn td:first-child{border-left:3px solid var(--or)}
tr.rsel td{background:var(--orl)!important}
tr:hover td{background:#faf8f6}
.sid{font-family:monospace;font-size:12px;font-weight:700;color:var(--or);background:var(--orl);padding:2px 6px;border-radius:4px}
.side{color:var(--tx3);font-size:11px;font-style:italic}
.tok{color:var(--gn);font-weight:700;font-size:15px}
.twarn{color:var(--or);font-size:11px;font-weight:700}
.epanel{background:var(--orl);border:1.5px solid var(--orm);border-radius:8px;padding:12px 14px;margin:10px 14px 14px;display:none}
.epanel.show{display:block}
.elabel{font-size:11px;font-weight:700;color:var(--or);margin-bottom:10px}
.sdrop{background:var(--sf);border:1.5px solid var(--bd);border-radius:8px;box-shadow:var(--shl);max-height:200px;overflow-y:auto;margin-top:4px;display:none;position:relative;z-index:200}
.sdrop.show{display:block}
.sri{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bd);display:flex;gap:8px;align-items:center;transition:background .1s}
.sri:last-child{border-bottom:none}
.sri:hover{background:var(--orl)}
.sri-n{font-weight:600;flex-shrink:0}
.sri-id{font-family:monospace;color:var(--or);font-size:11px;flex-shrink:0}
.sri-a{color:var(--tx3);font-size:11px;flex:1;text-align:right;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sbar{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:2px solid var(--orm);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -4px 16px rgba(241,90,0,.08);z-index:50}
.smsg{font-size:12px;color:var(--tx2);flex:1}
.smsg.ok{color:var(--gn);font-weight:600}
.smsg.warn{color:var(--or);font-weight:600}
.smsg.loading{color:var(--or)}
.prog{height:3px;background:var(--bd);border-radius:99px;overflow:hidden;margin-top:5px;display:none}
.progf{height:100%;background:var(--or);border-radius:99px;transition:width .3s}
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.eico{font-size:36px;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:13px;height:13px;border:2px solid var(--bd);border-top-color:var(--or);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">📦 交貨便批次匯入工具</div>
  <div class="hdr-sub">7-11 超商交貨便</div>
  <button class="btn" onclick="setProxyUrl()" style="margin-left:auto;background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);font-size:11px;padding:4px 10px">⚙️ 設定網址</button>
  <div style="display:flex;align-items:center;gap:6px">
    <div class="pdot" id="pdot"></div>
    <span class="plabel" id="plabel">檢查連線中…</span>
  </div>
  </div>
</div>

<div class="pbanner" id="pbanner">
  ⚠️ 門市查詢未啟動，請先執行 <code>python proxy.py</code>
  <button class="btn btg btsm" onclick="checkProxy()" style="margin-left:auto">重試</button>
</div>

<div class="main">
  <!-- 左欄 -->
  <div style="display:flex;flex-direction:column;gap:14px">
    <div class="card">
      <div class="ctitle">📤 寄件人設定</div>
      <div class="cbody">
        <div class="stabs" id="stabs"></div>
        <div class="brow" style="margin-bottom:12px">
          <button class="btn btg btsm" onclick="addSender()">＋ 新增</button>
          <button class="btn btg btsm" onclick="delSender()">🗑 刪除</button>
        </div>
        <div class="fr">
          <div class="fg"><label>姓名</label><input id="sN"></div>
          <div class="fg"><label>電話</label><input id="sP"></div>
        </div>
        <div class="fg"><label>Email</label><input id="sE"></div>
        <div class="fr">
          <div class="fg" style="flex:1.5">
            <label>退貨門市</label>
            <div class="ib"><input id="sRS"><button class="btn btg btsm" onclick="lookupRS()">🔍</button></div>
          </div>
          <div class="fg" style="flex:1"><label>店號</label><input id="sRSI"></div>
        </div>
        <div class="fg"><label>包裹預設價值</label><input id="pv" value="1000"></div>
      </div>
    </div>

    <div class="card" style="flex:1">
      <div class="ctitle">📋 貼上收件人資料</div>
      <div class="cbody">
        <div class="brow" style="margin-bottom:10px">
          <button class="btn btp" onclick="parseData()">🔍 解析資料</button>
          <button class="btn btg" onclick="g('inp').value=''">清除</button>
          <span style="color:var(--tx3);font-size:11px;align-self:center">每筆用「-」獨行分隔</span>
        </div>
        <textarea id="inp" rows="18" placeholder="王小明
0900000000
XX門市
-
陳小美
0911111111
XX門市"></textarea>
      </div>
    </div>
  </div>

  <!-- 右欄 -->
  <div style="display:flex;flex-direction:column;gap:14px">
    <div class="card" style="flex:1">
      <div class="ctitle" style="justify-content:space-between">
        <span>👥 解析結果</span>
        <span id="cnt" style="font-weight:400;color:var(--tx3);font-size:11px"></span>
      </div>
      <div class="twrap">
        <table><thead><tr>
          <th style="width:26px">#</th>
          <th>姓名</th><th>電話</th><th>取件門市</th><th>店號</th>
          <th style="width:70px">狀態</th><th style="width:40px"></th>
        </tr></thead>
        <tbody id="tb">
          <tr><td colspan="7"><div class="empty"><div class="eico">📋</div>解析後顯示於此</div></td></tr>
        </tbody></table>
      </div>
      <div class="epanel" id="ep">
        <div class="elabel">✏️ 編輯收件人 <span id="eidx" style="color:var(--tx2);font-weight:400"></span></div>
        <div class="fr">
          <div class="fg"><label>姓名</label><input id="en"></div>
          <div class="fg"><label>電話</label><input id="ephone"></div>
        </div>
        <div class="fg">
          <label>取件門市</label>
          <div class="ib">
            <input id="estore" oninput="onSI()" onkeydown="if(event.key==='Enter')srch()" placeholder="輸入門市名稱…">
            <button class="btn btg btsm" id="bsrch" onclick="srch()">🔍</button>
          </div>
          <div class="sdrop" id="sdrop"></div>
        </div>
        <div class="fg"><label>店號</label><input id="eid" style="font-family:monospace;color:var(--or)"></div>
        <div class="brow">
          <button class="btn btp btsm" onclick="saveEdit()">✓ 更新</button>
          <button class="btn btg btsm" onclick="delRow()">🗑 刪除</button>
          <button class="btn btg btsm" onclick="closeEdit()">✕</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="sbar">
  <div>
    <div class="smsg" id="smsg">就緒 — 貼上收件人資料後點「解析資料」</div>
    <div class="prog" id="prog"><div class="progf" id="pf" style="width:0%"></div></div>
  </div>
  <div class="brow">
    <button class="btn btg btsm" onclick="addEmpty()">＋ 新增空白</button>
    <button class="btn btg" onclick="autoFill()">🌐 補齊店號</button>
    <button class="btn btgn" onclick="exportXlsx()">📊 匯出 Excel</button>
  </div>
</div>

<script>
// 雲端 proxy 網址（部署後填入，或本機用 http://localhost:7711）
const PROXY = localStorage.getItem('proxy_url') || 'https://711-proxy-production.up.railway.app';
let senders=[{name:'施茗翔',phone:'0908303097',email:'oo921012@gmail.com',returnStore:'西盛門市',returnStoreId:'921714'},{name:'陳芷葳',phone:'0978297386',email:'Weibychen0702@gmail.com',returnStore:'鑫輝煌門市',returnStoreId:'158657'}];
let cur=0,recipients=[],editIdx=-1,cache={};

// Proxy
async function checkProxy(){
  try{const r=await fetch(`${PROXY}/ping`,{signal:AbortSignal.timeout(2000)});const d=await r.json();if(d.ok){setPOk(true);return true;}}catch{}
  setPOk(false);return false;
}
function setPOk(ok){
  g('pdot').className='pdot '+(ok?'ok':'fail');
  g('plabel').textContent=ok?'門市查詢正常':'查詢服務未啟動';
  g('pbanner').style.display=ok?'none':'flex';
}

// 解析
const CO=['台北市','臺北市','新北市','桃園市','新竹市','苗栗市','台中市','臺中市','彰化市','南投市','嘉義市','台南市','臺南市','高雄市','基隆市','台北','臺北','新北','桃園','新竹','苗栗','台中','臺中','彰化','南投','雲林','嘉義','台南','臺南','高雄','屏東','宜蘭','花蓮','台東','臺東','基隆','澎湖','金門','連江','馬祖'];
const PR=/白[LMXS]|黑[LMXS]|[LMXS]{1,2}[*×]\d|老虎|兔子|鴨子|棕熊|北極熊|珍島犬|老鷹|京都鴨|白色|黑色|灰色|棕色|藍色|紅色|[白黑棕灰]\s*[LMXS2-9]|\d+[XL]{1,2}\*?\d*|各一|含運|後五|末五|入帳/u;
const NS=new Set(['門市','取件','付款','取貨','常溫','冷凍','總金','含運','金額','訂購','訂單','寄件','收件','收件人','後五','末五','入帳','珍島','京都','老鷹','老虎','兔子','鴨子','棕熊','北極','白色','黑色','灰色']);
function normSt(raw){
  let s=raw.trim().replace(/^(7-?ELEVEN|7-?11|711)\s*[：:門市]*\s*/i,'').trim().replace(/^門市[：:]\s*/,'').trim();
  if(s.includes('：'))s=s.split('：').pop().trim();
  let county='';
  for(const c of CO){if(s.startsWith(c)&&s.length>c.length+1){const r=s.slice(c.length).trim();if(r.replace(/門市|店/g,'').length>=2){county=c;s=r;break;}}}
  if(s.endsWith('店')&&!s.endsWith('門市'))s=s.slice(0,-1)+'門市';
  else if(!s.endsWith('門市'))s+='門市';
  return{store:s,county};
}
function xName(line){
  if(/^[A-Za-z\s.]+$/.test(line.trim()))return'';
  if(PR.test(line))return'';
  const m=line.match(/^姓名[：:]\s*([\u4e00-\u9fff]{2,4})/);if(m)return m[1];
  const w=line.match(/[\u4e00-\u9fff]{2,4}/g)||[];
  for(const x of w)if(!NS.has(x))return x;
  return'';
}
function parseAll(t){return t.trim().split(/\n\s*-\s*\n/).map(b=>b.trim()).filter(Boolean).map(pOne).filter(Boolean);}
function pOne(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length)return null;
  const r={name:'',phone:'',store:'',storeId:'',county:'',notes:text};
  const sc=[];
  for(const line of lines){
    const pm=line.match(/(09\d{2}[-\s]?\d{3}[-\s]?\d{3}|09\d{8})/);
    if(pm&&!r.phone){r.phone=pm[1].replace(/[-\s]/g,'');continue;}
    const sid=line.match(/店號[：:\s]*(\d{4,7})/);if(sid&&!r.storeId)r.storeId=sid[1];
    // 門市店名：xxx 格式
    const snm=line.match(/門市店名[：:\s]*([^\s]{2,10})/);
    if(snm&&!r.store){const{store,county}=normSt(snm[1].trim());r.store=store;r.county=county;}
    // 通用門市識別（跳過含「門市店號」「門市店名」的行，避免誤抓）
    if(!r.store&&!/門市店[號名]/.test(line)){
      const sre=new RegExp('(7-?(?:ELEVEN|11)|711)?\\s*[：:]?\\s*((?:'+CO.join('|')+')?[^\\s\\d、，,/（）【】]{2,10}(?:門市|店))','i');
      const sm=line.match(sre);
      if(sm&&!r.store){const{store,county}=normSt(sm[2].trim());if(!/^(購物|超商|便利|賣場)/.test(store)){r.store=store;r.county=county;}}
    }
    if(!r.store&&/^[\u4e00-\u9fff]{2,6}$/.test(line)&&!PR.test(line)&&!['白色','黑色','灰色','棕色','各一','含運','後五','末五'].includes(line))sc.push(line);
  }
  for(const line of lines){const m=line.match(/^姓名[：:]\s*([\u4e00-\u9fff]{2,4})/);if(m){r.name=m[1];break;}}
  if(!r.name)for(const line of lines){const m=line.match(/^收件人[：:]\s*([\u4e00-\u9fff]{2,4})/);if(m){r.name=m[1];break;}}
  if(!r.name)for(const line of lines){
    // 嘗試從「姓名 電話」同行格式抽出姓名
    const namPhone=line.match(/^([一-鿿]{2,4})\s+(09\d{8}|09\d{2}[-\s]?\d{3}[-\s]?\d{3})/);
    if(namPhone){r.name=namPhone[1];if(!r.phone)r.phone=namPhone[2].replace(/[-\s]/g,'');break;}
    if(/09\d|7-11|ELEVEN|門市|金額|\$|＄|末五碼|後五碼|店號|\d{4,}|電話[：:]/.test(line))continue;
    const n=xName(line);if(n){r.name=n;break;}
  }
  if(!r.store)for(const c of sc){if(c!==r.name){const{store,county}=normSt(c);r.store=store;r.county=county;break;}}
  return(r.name||r.phone)?r:null;
}

// API
async function qStore(name){try{const r=await fetch(`${PROXY}/search?name=${encodeURIComponent(name)}`,{signal:AbortSignal.timeout(8000)});return await r.json();}catch{return[];}}
function nm(a,b){return a.replace(/門市|店/g,'').trim()===b.replace(/門市|店/g,'').trim();}
async function lookup(name,county=''){
  if(cache[name])return cache[name];
  let res=await qStore(name);if(!res.length)return'';
  if(county){const f=res.filter(r=>r.addr.includes(county));if(f.length)res=f;}
  for(const r of res)if(nm(r.name,name)){cache[name]=r.id;return r.id;}
  cache[name]=res[0].id;return res[0].id;
}

// 寄件人
function renderTabs(){g('stabs').innerHTML=senders.map((s,i)=>`<div class="stab ${i===cur?'active':''}" onclick="selS(${i})">${s.name}</div>`).join('');loadF();}
function setProxyUrl() {
  const cur = localStorage.getItem('proxy_url') || '';
  const url = prompt('輸入雲端 Proxy 網址：\n例如：https://xxxx.railway.app', cur);
  if (url === null) return;
  if (url.trim()) {
    localStorage.setItem('proxy_url', url.trim());
    location.reload();
  } else {
    localStorage.removeItem('proxy_url');
    location.reload();
  }
}
function selS(i){saveF();cur=i;renderTabs();}
function loadF(){const s=senders[cur];['sN','sP','sE','sRS','sRSI'].forEach((id,j)=>{g(id).value=[s.name,s.phone,s.email,s.returnStore,s.returnStoreId][j]||'';});}
function saveF(){senders[cur]={name:g('sN').value,phone:g('sP').value,email:g('sE').value,returnStore:g('sRS').value,returnStoreId:g('sRSI').value};}
function addSender(){const n=prompt('新寄件人姓名：');if(!n)return;senders.push({name:n,phone:'',email:'',returnStore:'',returnStoreId:''});cur=senders.length-1;renderTabs();}
function delSender(){if(senders.length<=1){alert('至少保留一個');return;}if(!confirm(`刪除「${senders[cur].name}」？`))return;senders.splice(cur,1);cur=Math.max(0,cur-1);renderTabs();}
async function lookupRS(){
  const n=g('sRS').value.trim();if(!n)return;
  setSt('🔍 查詢中…','loading');
  const res=await qStore(n);
  if(!res.length){setSt('查無結果','warn');return;}
  if(res.length===1){g('sRSI').value=res[0].id;setSt(`✅ ${res[0].name} ${res[0].id}`,'ok');}
  else showPick(res,r=>{g('sRS').value=r.name;g('sRSI').value=r.id;});
}

// 解析+補店號
async function parseData(){
  const t=g('inp').value.trim();if(!t){alert('請先貼上資料');return;}
  recipients=parseAll(t);renderTable();
  setSt(`✅ 解析完成：${recipients.length} 筆  ⟳ 查詢門市店號中…`,'loading');
  showP(0);await autoFill(true);
}
async function autoFill(silent=false){
  const miss=recipients.map((r,i)=>[i,r]).filter(([,r])=>r.store&&!r.storeId);
  if(!miss.length){if(!silent)alert('已全部填入！');return;}
  if(!silent)setSt(`🌐 查詢 ${miss.length} 筆門市中…`,'loading');
  showP(0);let filled=0;
  for(const[i,r]of miss){const sid=await lookup(r.store,r.county);if(sid){recipients[i].storeId=sid;filled++;}showP(Math.round(filled/miss.length*100));renderRow(i);}
  hideP();updCnt();
  const ok=recipients.filter(r=>r.name&&r.phone&&r.storeId).length;
  const nf=miss.filter(([i])=>!recipients[i].storeId).map(([i])=>recipients[i].store);
  if(nf.length)setSt(`✅ ${recipients.length} 筆，${ok} 完整  ⚠️ 未找到：${nf.slice(0,3).join('、')}${nf.length>3?'…':''}  → 點列手動補充`,'warn');
  else setSt(`✅ ${recipients.length} 筆全部完整，店號補齊`,'ok');
}

// 表格
function renderTable(){
  const tb=g('tb');
  if(!recipients.length){tb.innerHTML=`<tr><td colspan="7"><div class="empty"><div class="eico">📋</div>尚無資料</div></td></tr>`;updCnt();return;}
  tb.innerHTML=recipients.map(rowH).join('');updCnt();
}
function renderRow(i){const tr=document.querySelector(`tr[data-i="${i}"]`);if(tr)tr.outerHTML=rowH(recipients[i],i);}
function rowH(r,i){
  const ok=r.name&&r.phone&&r.store&&r.storeId;
  const sid=r.storeId?`<span class="sid">${r.storeId}</span>`:`<span class="side">待查詢</span>`;
  const st=ok?`<span class="tok">✓</span>`:`<span class="twarn">⚠️</span>`;
  return`<tr class="${ok?'rok':'rwarn'}" data-i="${i}" onclick="selRow(${i})" style="cursor:pointer"><td style="color:var(--tx3);font-size:11px">${i+1}</td><td><b>${r.name||'—'}</b></td><td style="font-family:monospace">${r.phone||'—'}</td><td>${r.store||'—'}</td><td>${sid}</td><td>${st}</td><td><button class="btn btg btsm" style="padding:3px 7px" onclick="event.stopPropagation();dRow(${i})">×</button></td></tr>`;
}
function updCnt(){const ok=recipients.filter(r=>r.name&&r.phone&&r.storeId).length;g('cnt').textContent=recipients.length?`${recipients.length} 筆 / ${ok} 完整`:''}
function selRow(i){document.querySelectorAll('#tb tr').forEach(t=>t.classList.remove('rsel'));document.querySelector(`tr[data-i="${i}"]`)?.classList.add('rsel');openEdit(i);}
function addEmpty(){recipients.push({name:'',phone:'',store:'',storeId:'',county:'',notes:''});renderTable();selRow(recipients.length-1);}
function dRow(i){if(!confirm('確定刪除？'))return;recipients.splice(i,1);closeEdit();renderTable();}

// 編輯
function openEdit(i){editIdx=i;const r=recipients[i];g('eidx').textContent=`第 ${i+1} 筆`;g('en').value=r.name;g('ephone').value=r.phone;g('estore').value=r.store;g('eid').value=r.storeId;g('ep').classList.add('show');g('sdrop').classList.remove('show');}
function closeEdit(){editIdx=-1;g('ep').classList.remove('show');document.querySelectorAll('#tb tr').forEach(t=>t.classList.remove('rsel'));}
function saveEdit(){if(editIdx<0)return;recipients[editIdx]={...recipients[editIdx],name:g('en').value.trim(),phone:g('ephone').value.trim(),store:g('estore').value.trim(),storeId:g('eid').value.trim()};renderTable();selRow(editIdx);setSt(`✏️ 已更新第 ${editIdx+1} 筆`,'ok');}
function delRow(){if(editIdx<0)return;dRow(editIdx);}

let st;
function onSI(){clearTimeout(st);const v=g('estore').value.trim();if(!v){g('sdrop').classList.remove('show');return;}st=setTimeout(srch,400);}
async function srch(){
  const n=g('estore').value.trim();if(!n)return;
  const b=g('bsrch');b.innerHTML='<span class="spin"></span>';b.disabled=true;
  const res=await qStore(n);b.innerHTML='🔍';b.disabled=false;
  const d=g('sdrop');
  if(!res.length){d.innerHTML=`<div style="padding:10px 12px;color:var(--tx3);font-size:12px">查無結果</div>`;d.classList.add('show');return;}
  d.innerHTML=res.slice(0,15).map(r=>`<div class="sri" onclick="pickS('${r.name}','${r.id}')"><span class="sri-n">${r.name}</span><span class="sri-id">${r.id}</span><span class="sri-a">${r.addr}</span></div>`).join('');
  d.classList.add('show');
}
function pickS(name,id){g('estore').value=name;g('eid').value=id;g('sdrop').classList.remove('show');setSt(`✅ ${name} 店號 ${id}`,'ok');}
document.addEventListener('click',e=>{if(!e.target.closest('#ep'))g('sdrop').classList.remove('show');});

function showPick(res,cb){
  const w=window.open('','_blank','width=520,height=360');if(!w)return;
  w.document.write(`<html><head><meta charset="UTF-8"><style>body{font-family:sans-serif;font-size:13px;padding:12px}table{width:100%;border-collapse:collapse}th,td{padding:7px 10px;text-align:left;border-bottom:1px solid #eee}th{background:#f5f5f5;font-weight:700}tr:hover td{background:#fff3ec;cursor:pointer}</style></head><body><h3 style="margin-bottom:10px">請選擇門市</h3><table><thead><tr><th>門市名稱</th><th>店號</th><th>地址</th></tr></thead><tbody>${res.map(r=>`<tr onclick="window.opener._pick('${r.name}','${r.id}');window.close()"><td>${r.name}</td><td>${r.id}</td><td>${r.addr}</td></tr>`).join('')}</tbody></table></body></html>`);
  window._pick=cb;
}

// 匯出（一般交貨便-取貨不付款格式）
// Row1: 標題, Row2: 欄位名, Row3: 範例, Row4起: 資料
const HDR1 = ['一般交貨便-取貨不付款(以下欄位皆必填)','','','','','','','','','','',''];
const HDR2 = ['','寄件人姓名','寄件人電話','寄件人mail','實際包裏價值','收件門市','收件門市店號','收件人姓名\n(請填寫證件姓名)','收件人電話','收件人mail','退貨門市\n(非必填，退貨門市未填寫者，則依原寄件門市為退貨門市。此欄位有填寫者，退貨門市店號必填)','退貨門市店號\n(非必填，退貨門市未填寫者，則依原寄件門市為退貨門市。此欄位有填寫者，退貨門市店號必填)'];
const HDR3 = ['範例','王小明','0987654321','xx@gmial.com','1200','百建門市','211147','李大美','0912345678','oooooo@gmail.com','見晴門市','217477'];

function exportXlsx(){
  saveF();if(!recipients.length){alert('沒有收件人資料');return;}
  const inc=recipients.filter(r=>!r.name||!r.phone||!r.store||!r.storeId);
  if(inc.length&&!confirm(`${inc.length} 筆不完整，確定繼續？`))return;
  const s=senders[cur];const pval=g('pv').value||'1000';
  const dataRows=recipients.map(r=>[
    '',           // A欄空白
    s.name,       // 寄件人姓名
    s.phone,      // 寄件人電話
    s.email,      // 寄件人mail
    pval,         // 實際包裹價值
    r.store,      // 收件門市
    r.storeId,    // 收件門市店號
    r.name,       // 收件人姓名
    r.phone,      // 收件人電話
    s.email,      // 收件人mail
    s.returnStore,    // 退貨門市
    s.returnStoreId,  // 退貨門市店號
  ]);
  const aoa=[HDR1, HDR2, HDR3, ...dataRows];
  const wb=XLSX.utils.book_new();const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[8,14,14,24,12,14,12,14,14,24,14,12].map(w=>({wch:w}));
  ws['!rows']=[{hpt:20},{hpt:36},{hpt:18},...dataRows.map(()=>({hpt:18}))];
  // 合併第1行標題
  ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:11}}];
  XLSX.utils.book_append_sheet(wb,ws,'工作表1');
  XLSX.writeFile(wb,`交貨便批次匯入_${new Date().toISOString().replace(/[-:T]/g,'').slice(0,14)}.xlsx`);
}

// Utils
function g(id){return document.getElementById(id);}
function setSt(msg,t=''){const e=g('smsg');e.textContent=msg;e.className='smsg'+(t?' '+t:'');}
function showP(p){g('prog').style.display='block';g('pf').style.width=p+'%';}
function hideP(){g('prog').style.display='none';}

renderTabs();
checkProxy();
setInterval(checkProxy,15000);
['sN','sP','sE','sRS','sRSI'].forEach(id=>g(id).addEventListener('change',saveF));
